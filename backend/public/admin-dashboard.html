<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Revobin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --green: #2d7a3a; --green-pale: #eaf4ec; --green-dark: #1e5427;
      --orange: #e8722a; --orange-pale: #fdf1ea;
      --blue: #1a6b8a; --blue-pale: #e8f4f9;
      --text: #1a2e1a; --muted: #6b7f6b; --border: #dde5d8; --bg: #f4f6f3;
      --sidebar: 230px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar); background: var(--green-dark);
      min-height: 100vh; position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column; padding: 20px 14px;
    }
    .sb-logo { display: flex; align-items: center; gap: 8px; padding: 0 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .sb-logo i { color: #7dd98a; font-size: 15px; }
    .sb-logo i.o { color: var(--orange); }
    .sb-logo span { font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.9); letter-spacing: 1px; }

    .sb-user { padding: 0 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .sb-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #7dd98a; margin-bottom: 8px; }
    .sb-name { font-size: 13px; font-weight: 700; color: white; }
    .sb-role { font-size: 10px; font-weight: 700; color: var(--orange); margin-top: 2px; letter-spacing: 1px; }

    .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0 8px; margin: 14px 0 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); text-decoration: none; transition: all 0.2s; margin-bottom: 2px; }
    .nav-item i { font-size: 13px; width: 16px; text-align: center; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.13); color: white; }

    .sb-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); }
    .signout { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.35); text-decoration: none; padding: 8px 12px; cursor: pointer; transition: color 0.2s; }
    .signout:hover { color: rgba(255,255,255,0.7); }

    .main { margin-left: var(--sidebar); flex: 1; }

    .topbar {
      background: white; border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar h1 { font-size: 15px; font-weight: 800; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .admin-badge { background: #fde8e8; color: #e74c3c; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; }

    .content { padding: 24px 28px; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .sc-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 12px; }
    .stat-card.red .sc-icon { background: #fde8e8; color: #e74c3c; }
    .stat-card.orange .sc-icon { background: var(--orange-pale); color: var(--orange); }
    .stat-card.green .sc-icon { background: var(--green-pale); color: var(--green); }
    .stat-card.blue .sc-icon { background: var(--blue-pale); color: var(--blue); }
    .sc-val { font-size: 24px; font-weight: 900; color: var(--text); }
    .sc-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .two-col { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 20px; }

    .panel { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-header h3 { font-size: 14px; font-weight: 800; }
    .panel-header span { font-size: 11px; color: var(--muted); }
    .chart-wrap { padding: 20px; display: flex; align-items: center; justify-content: center; }

    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--bg); }
    th { padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--muted); text-align: left; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; font-size: 12px; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 3px; }
    .score-num { font-size: 12px; font-weight: 800; min-width: 30px; }

    .lbl-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
    .lbl-badge.critical { background: #fde8e8; color: #e74c3c; }
    .lbl-badge.high { background: var(--orange-pale); color: var(--orange); }
    .lbl-badge.medium { background: #fefde8; color: #b8860b; }
    .lbl-badge.low { background: var(--green-pale); color: var(--green); }

    .view-btn { font-size: 11px; color: var(--green); font-weight: 700; text-decoration: none; }
    .view-btn:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    @media (max-width: 1024px) { .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; } .stats { grid-template-columns: 1fr 1fr; } .content { padding: 16px; } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sb-logo">
      <i class="fa-solid fa-paw"></i>
      <i class="fa-solid fa-heart o"></i>
      <span>Revobin Admin</span>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="avatarLetter">A</div>
      <div class="sb-name" id="adminName">Admin</div>
      <div class="sb-role">ADMINISTRATOR</div>
    </div>
    <div class="nav-label">Management</div>
    <a class="nav-item active" href="admin-dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a class="nav-item" href="all-campaigns.html"><i class="fa-solid fa-fire"></i> All Campaigns</a>
    <a class="nav-item" href="create-campaign.html"><i class="fa-solid fa-plus"></i> Create Campaign</a>
    <div class="nav-label">System</div>
    <a class="nav-item" href="#"><i class="fa-solid fa-users"></i> Users</a>
    <a class="nav-item" href="#"><i class="fa-solid fa-gear"></i> Settings</a>
    <div class="sb-footer">
      <div class="signout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Admin Dashboard</h1>
      <div class="topbar-right">
        <span class="admin-badge">ADMIN</span>
        <span id="topName">Admin</span>
      </div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat-card red">
          <div class="sc-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <div class="sc-val" id="criticalCount">—</div>
          <div class="sc-lbl">Critical Cases</div>
        </div>
        <div class="stat-card orange">
          <div class="sc-icon"><i class="fa-solid fa-fire"></i></div>
          <div class="sc-val" id="totalCount">—</div>
          <div class="sc-lbl">Total Cases</div>
        </div>
        <div class="stat-card green">
          <div class="sc-icon"><i class="fa-solid fa-paw"></i></div>
          <div class="sc-val" id="animalCount">—</div>
          <div class="sc-lbl">Animal Cases</div>
        </div>
        <div class="stat-card blue">
          <div class="sc-icon"><i class="fa-solid fa-users"></i></div>
          <div class="sc-val" id="humanCount">—</div>
          <div class="sc-lbl">Human Cases</div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <h3>All Cases — Sorted by AI Priority</h3>
            <span id="lastUpdate">Loading...</span>
          </div>
          <div id="tableWrap">
            <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><h3>Priority Distribution</h3></div>
          <div class="chart-wrap">
            <canvas id="priorityChart" width="280" height="280"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('userRole');
    const name = localStorage.getItem('userName');

    if (!token || role !== 'admin') {
      alert('Access denied. Admins only.');
      window.location.href = 'login.html';
    }

    if (name) {
      document.getElementById('adminName').textContent = name;
      document.getElementById('topName').textContent = name;
      document.getElementById('avatarLetter').textContent = name[0].toUpperCase();
    }

    const labelColors = {
      critical: '#e74c3c', high: '#e8722a', medium: '#f0c040', low: '#2d7a3a'
    };

    let chartInstance = null;

    function buildChart(cases) {
      const counts = { Critical: 0, High: 0, Medium: 0, Low: 0 };
      cases.forEach(c => {
        const lbl = c.CaseScore?.label || '';
        if (counts[lbl] !== undefined) counts[lbl]++;
      });
      const ctx = document.getElementById('priorityChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Critical', 'High', 'Medium', 'Low'],
          datasets: [{
            data: [counts.Critical, counts.High, counts.Medium, counts.Low],
            backgroundColor: ['#e74c3c', '#e8722a', '#f0c040', '#2d7a3a'],
            borderWidth: 2, borderColor: '#fff'
          }]
        },
        options: {
          responsive: false,
          plugins: { legend: { position: 'bottom', labels: { font: { family: 'Montserrat', size: 11 }, padding: 12 } } }
        }
      });
    }

    async function loadCases() {
      try {
        const res = await fetch('/api/cases/priority', { headers: { 'Authorization': token } });
        const cases = await res.json();

        document.getElementById('totalCount').textContent = cases.length;
        document.getElementById('criticalCount').textContent = cases.filter(c => (c.CaseScore?.label || c.urgency || '').toLowerCase() === 'critical').length;
        document.getElementById('animalCount').textContent = cases.filter(c => c.category === 'animal').length;
        document.getElementById('humanCount').textContent = cases.filter(c => c.category === 'human').length;
        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

        buildChart(cases);

        if (cases.length === 0) {
          document.getElementById('tableWrap').innerHTML = '<div class="loading">No cases found.</div>';
          return;
        }

        const rows = cases.map((c, i) => {
          const score = c.CaseScore;
          const finalScore = score?.finalScore ?? 0;
          const label = (score?.label ?? c.urgency ?? 'low').toLowerCase();
          const color = labelColors[label] || '#999';
          return `
            <tr>
              <td><strong>${i + 1}</strong></td>
              <td>
                <div style="font-weight:700">${c.title}</div>
                <div style="font-size:10px;color:var(--muted)">${c.category} · ${c.location || '—'}</div>
              </td>
              <td>
                <div class="score-wrap">
                  <div class="score-bar"><div class="score-fill" style="width:${finalScore}%;background:${color}"></div></div>
                  <span class="score-num" style="color:${color}">${finalScore}</span>
                </div>
              </td>
              <td><span class="lbl-badge ${label}">${label.toUpperCase()}</span></td>
              <td style="max-width:160px;font-size:11px;color:var(--muted)">${score?.summary || '—'}</td>
              <td><a href="campaign-details.html?id=${c.id}" class="view-btn">View →</a></td>
            </tr>
          `;
        }).join('');

        document.getElementById('tableWrap').innerHTML = `
          <table>
            <thead><tr><th>#</th><th>Case</th><th>AI Score</th><th>Priority</th><th>Summary</th><th>Action</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;

      } catch (err) {
        document.getElementById('tableWrap').innerHTML = '<div class="loading">Could not load cases.</div>';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    loadCases();
  </script>
</body>
</html>
