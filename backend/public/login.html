<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Community & Animal Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --green: #2d7a3a;
      --green-light: #3d9e4e;
      --green-pale: #eaf4ec;
      --orange: #e8722a;
      --text: #1a2e1a;
      --muted: #6b7f6b;
      --border: #dde5d8;
      --bg: #f4f6f3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
    .logo i { color: var(--green); font-size: 18px; }
    .logo i.orange { color: var(--orange); }
    .logo span { font-size: 13px; font-weight: 800; color: var(--text); letter-spacing: 1px; }
    h1 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .subtitle a { color: var(--green); font-weight: 600; text-decoration: none; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .input-box { position: relative; }
    .input-box i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: #aaa; font-size: 13px;
    }
    .input-box input {
      width: 100%; padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-size: 13px;
      color: var(--text); background: var(--bg);
      outline: none; transition: border-color 0.2s;
    }
    .input-box input:focus { border-color: var(--green); }
    .input-box input::placeholder { color: #bbb; }
    .extras {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px; font-size: 12px;
    }
    .remember { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
    .remember input { accent-color: var(--green); cursor: pointer; }
    .forgot { color: var(--green); font-weight: 600; text-decoration: none; }
    .btn-login {
      width: 100%; padding: 13px; background: var(--green);
      color: white; border: none; border-radius: 8px;
      font-family: 'Montserrat', sans-serif; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: var(--green-light); }
    .btn-login:disabled { background: var(--muted); cursor: not-allowed; }
    .error-msg { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 10px; display: none; }
    .bottom { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
    .bottom a { color: var(--green); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="fa-solid fa-paw"></i>
      <i class="fa-solid fa-heart orange"></i>
      <span>Community Support</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Don't have an account? <a href="signup.html">Sign up here</a></p>

    <div class="field">
      <label>Email</label>
      <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-box">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>
    </div>

    <div class="extras">
      <label class="remember">
        <input type="checkbox" /> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <p class="error-msg" id="errorMsg"></p>
    <p class="bottom">New here? <a href="signup.html">Create a free account</a></p>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      errorMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userRole', data.role);

          // redirect حسب الـ role
          if (data.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else if (data.role === 'organization') {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'home.html';
          }
        } else {
          errorMsg.textContent = data.message || 'Login failed.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }

      } catch (err) {
        errorMsg.textContent = 'Could not connect to server.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // تشغيل بضغط Enter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
