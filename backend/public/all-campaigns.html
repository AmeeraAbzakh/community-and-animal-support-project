<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Campaigns - Community and Animal Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --green: #2d7a3a;
      --green-light: #3d9e4e;
      --green-pale: #eaf4ec;
      --orange: #e8722a;
      --orange-pale: #fdf1ea;
      --blue: #1a6b8a;
      --text: #1a2e1a;
      --muted: #6b7f6b;
      --border: #dde5d8;
      --bg: #f4f6f3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo i { color: var(--green); font-size: 16px; }
    .logo i.orange { color: var(--orange); }
    .logo span { font-size: 13px; font-weight: 800; color: var(--text); letter-spacing: 1px; }
    .nav-btns { display: flex; gap: 10px; }
    .btn-solid { padding: 7px 18px; border: none; border-radius: 7px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; color: white; background: var(--green); text-decoration: none; }

    .page { max-width: 1100px; margin: 0 auto; padding: 84px 24px 60px; }

    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .page-header p { font-size: 13px; color: var(--muted); }

    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 16px; border: 1.5px solid var(--border);
      border-radius: 20px; font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 700; background: white;
      cursor: pointer; transition: all 0.2s; color: var(--text);
    }
    .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .filter-btn.critical.active { background: #e74c3c; border-color: #e74c3c; }
    .filter-btn.high.active { background: var(--orange); border-color: var(--orange); }
    .filter-btn.medium.active { background: #f0c040; border-color: #f0c040; color: #333; }

    .priority-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 800; margin-bottom: 8px;
      text-transform: uppercase;
    }
    .priority-badge.critical { background: #fde8e8; color: #e74c3c; }
    .priority-badge.high { background: var(--orange-pale); color: var(--orange); }
    .priority-badge.medium { background: #fefde8; color: #b8860b; }
    .priority-badge.low { background: var(--green-pale); color: var(--green); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    .camp-card {
      background: white; border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; transition: all 0.2s; cursor: pointer;
    }
    .camp-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

    .camp-img {
      height: 140px; display: flex; align-items: center;
      justify-content: center; font-size: 48px;
    }
    .camp-img.green { background: linear-gradient(135deg, #1e5427, #2d7a3a); }
    .camp-img.orange { background: linear-gradient(135deg, #c05a1a, #e8722a); }
    .camp-img.blue { background: linear-gradient(135deg, #124d66, #1a6b8a); }

    .camp-body { padding: 18px; }
    .camp-body h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .camp-body p { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }

    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--green); }

    .camp-nums { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 12px; }
    .camp-nums .raised { font-weight: 700; }
    .camp-nums .goal { color: var(--muted); }

    .btn-donate {
      width: 100%; padding: 10px; background: var(--green); color: white;
      border: none; border-radius: 7px; font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
      text-decoration: none; display: block; text-align: center; transition: background 0.2s;
    }
    .btn-donate:hover { background: var(--green-light); }

    .loading { text-align: center; padding: 60px; color: var(--muted); }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      nav { padding: 0 16px; }
      .page { padding: 76px 16px 40px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="home.html">
      <i class="fa-solid fa-paw"></i>
      <i class="fa-solid fa-heart orange"></i>
      <span>Community and Animal Support</span>
    </a>
    <div class="nav-btns">
      <a href="create-campaign.html" class="btn-solid">+ Create Campaign</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>All Campaigns</h1>
      <p>Sorted by AI priority — most urgent cases first</p>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterCamps('all', this)">All</button>
      <button class="filter-btn critical" onclick="filterCamps('critical', this)">🔴 Critical</button>
      <button class="filter-btn high" onclick="filterCamps('high', this)">🟠 High</button>
      <button class="filter-btn medium" onclick="filterCamps('medium', this)">🟡 Medium</button>
      <button class="filter-btn" onclick="filterCamps('low', this)">🟢 Low</button>
    </div>

    <div class="grid" id="grid">
      <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
    </div>
  </div>

  <script>
    let allCampaigns = [];
    const colors = ['green', 'orange', 'blue'];

    async function loadCampaigns() {
      try {
        const res = await fetch('http://localhost:3000/api/cases/priority');
        allCampaigns = await res.json();
        showCampaigns(allCampaigns);
      } catch (err) {
        document.getElementById('grid').innerHTML =
          '<div class="loading">Could not load campaigns. Is the server running?</div>';
      }
    }

    function showCampaigns(list) {
      const grid = document.getElementById('grid');
      if (list.length === 0) {
        grid.innerHTML = '<div class="loading">No campaigns found.</div>';
        return;
      }
      grid.innerHTML = list.map((c, i) => {
        const goalAttr = Number(c.goal_amount) || 0;
        const raisedAttr = Number(c.current_amount) || 0;
        const pct = goalAttr > 0 ? Math.min(Math.round((raisedAttr / goalAttr) * 100), 100) : 0;
        
        const urgencyLabel = c.urgency ? c.urgency.toLowerCase() : 'low';
        const scoreVal = c.priority_score || 0;
        const categoryEmoji = c.category === 'human' ? '🧑' : '🐾';

        return `
          <div class="camp-card" onclick="window.location.href='campaign-details.html?id=${c.id}'">
            <div class="camp-img ${colors[i % 3]}">
              <span>${categoryEmoji}</span>
            </div>
            <div class="camp-body">
              <div class="priority-badge ${urgencyLabel}">${urgencyLabel} — ${scoreVal} pts</div>
              <h3>${c.title}</h3>
              <p>${c.description ? c.description.substring(0, 80) + '...' : ''}</p>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
              <div class="camp-nums">
                <span class="raised">JD ${raisedAttr.toLocaleString()} raised</span>
                <span class="goal">of JD ${goalAttr.toLocaleString()}</span>
              </div>
              <a href="campaign-details.html?id=${c.id}" class="btn-donate">Donate Now</a>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterCamps(label, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (label === 'all') {
        showCampaigns(allCampaigns);
      } else {
        showCampaigns(allCampaigns.filter(c => c.urgency && c.urgency.toLowerCase() === label));
      }
    }

    loadCampaigns();
  </script>

</body>
</html>
